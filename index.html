<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thiên Hoàng v2.0 - Duy Tan University</title>
    <style>
      body {
        background: radial-gradient(circle, #0a0a0a 0%, #000000 100%);
        color: #fff;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: rgba(10, 10, 10, 0.8);
        padding: 60px;
        border-radius: 30px;
        border: 2px solid #00f2ff;
        box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
        text-align: center;
        animation: float 4s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      h1 {
        font-size: 3.5em;
        text-shadow: 0 0 20px #00f2ff;
        color: #00f2ff;
        margin: 0;
      }
      .version {
        color: #555;
        margin-bottom: 30px;
      }
      .btn-neon {
        background: none;
        border: 2px solid #00f2ff;
        color: #00f2ff;
        padding: 15px 40px;
        font-size: 1.2em;
        text-decoration: none;
        font-weight: bold;
        text-transform: uppercase;
        transition: 0.4s;
        box-shadow: inset 0 0 10px #00f2ff;
      }
      .btn-neon:hover {
        background: #00f2ff;
        color: #000;
        box-shadow: 0 0 50px #00f2ff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>KILLUA SPEED</h1>
      <div class="version">Version 2.0 | Optimized by adu_ahoang</div>
      <p style="margin-bottom: 40px">
        Giải phóng bộ nhớ - Tăng tốc hệ thống tức thì.
      </p>
      <a href="dondep.exe" class="btn-neon">DOWNLOAD NOW</a>
    </div>
  </body>
</html>
